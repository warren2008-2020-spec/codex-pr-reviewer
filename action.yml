name: codex-pr-reviewer
description: Pre-review pull requests with a lightweight maintainer-focused CLI
branding:
  icon: shield
  color: blue
runs:
  using: composite
  steps:
    - shell: bash
      run: node ./bin/codex-pr-reviewer.js review "${{ inputs.path }}" ${{ inputs.json == 'true' && '--json' || '' }} ${{ inputs.annotations == 'true' && '--annotations' || '' }}
inputs:
  path:
    description: Repository path to review
    required: false
    default: .
  json:
    description: Emit JSON output
    required: false
    default: 'false'
  annotations:
    description: Emit native GitHub Actions annotations
    required: false
    default: 'true'
